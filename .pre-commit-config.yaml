repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.13
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        args: ["--line-length=120"]

  - repo: https://github.com/fsfe/reuse-tool
    rev: v4.0.0
    hooks:
      - id: reuse
        name: Check REUSE compliance (copyright/license headers)

exclude: assets/.*|\.venv/.*|build/.*|dist/.*|\.egg-info/.*
