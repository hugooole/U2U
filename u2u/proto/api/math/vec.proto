syntax = "proto3";

package rbs.api.proto.math;

message Vec2d {
  double x = 1;
  double y = 2;
}

message Vec2f {
  float x = 1;
  float y = 2;
}

message Vec2i {
  sint64 x = 1;
  sint64 y = 2;
}

message Vec3d {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Vec3f {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Vec3i {
  sint64 x = 1;
  sint64 y = 2;
  sint64 z = 3;
}
